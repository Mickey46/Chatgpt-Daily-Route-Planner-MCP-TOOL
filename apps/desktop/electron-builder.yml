appId: com.bcbaplanner.app
productName: BCBA Route Planner
directories:
  output: release
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
extraResources:
  - from: native/RouteHelper/.build/release/RouteHelper
    to: RouteHelper

afterPack: build/afterPack.js

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  # Ad-hoc signed (identity: "-") -- no Apple Developer ID required, and
  # gives every binary in the bundle a valid (if untrusted) signature. This
  # matters: `identity: null` skips signing *entirely*, and on modern macOS
  # that makes Gatekeeper report the app as "damaged" rather than just
  # showing the milder "unidentified developer" warning -- learned this the
  # hard way after a real download failed. Ad-hoc signing avoids the
  # "damaged" message; recipients still see one Gatekeeper prompt and need
  # to right-click -> Open the first time, since this isn't notarized.
  # hardenedRuntime is off on purpose: it's only beneficial paired with
  # notarization, and can cause an unnotarized ad-hoc build to crash instead.
  # If you get a paid Apple Developer ID, set identity to that team's
  # certificate, turn hardenedRuntime back on, and enable notarize for a
  # fully warning-free install on other Macs.
  identity: null
  hardenedRuntime: false
  extendInfo:
    # EventKit calendar access -- macOS 14+ uses the "full access" string,
    # older versions fall back to the classic one. Both are included for
    # compatibility; only the one the OS checks for actually shows in the
    # permission prompt.
    NSCalendarsFullAccessUsageDescription: >-
      BCBA Route Planner syncs your scheduled sessions into a dedicated
      "BCBA Schedule" calendar so they show up in Calendar.app and iCloud.
    NSCalendarsUsageDescription: >-
      BCBA Route Planner syncs your scheduled sessions into a dedicated
      "BCBA Schedule" calendar so they show up in Calendar.app and iCloud.

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
